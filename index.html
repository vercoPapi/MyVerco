<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH SYSTEM SERVER - HEAD LOCK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body {
            background: #05000a;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff;
            overflow: hidden;
        }
        .login-card {
            background: rgba(10, 0, 20, 0.95); padding: 40px; border-radius: 10px;
            border: 1px solid #bc13fe; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 20px #bc13fe; position: relative;
        }
        h2 { color: #bc13fe; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; text-shadow: 0 0 10px #bc13fe; }
        input {
            width: 100%; padding: 12px; background: transparent;
            border: 1px solid #bc13fe; border-radius: 5px; color: #fff;
            text-align: center; font-size: 16px; margin-bottom: 20px; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: #bc13fe;
            border: none; border-radius: 5px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: #fff; color: #bc13fe; box-shadow: 0 0 20px #fff; }

        #loading-view {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #05000a; border-radius: 10px; 
            justify-content: center; align-items: center; flex-direction: column; z-index: 99;
        }
        .loader {
            width: 45px; height: 45px; border: 3px solid #333; border-top: 3px solid #bc13fe;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { color: #bc13fe; font-size: 13px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="login-card">
        <div id="loading-view">
            <div class="loader"></div>
            <p id="status">MENUNGGU IZIN SERVER...</p>
        </div>

        <h2>SERVER AUTH</h2>
        <input type="text" id="userId" placeholder="MASUKKAN ID" autocomplete="off">
        <button onclick="kirimData()">AKTIFKAN OFFSET</button>
    </div>

    <script type="application/xml" id="server-config">
        <ServerOffset>
            <Action>HEAD_LOCK_DIRECT</Action>
            <Bone>Head_Bone_05</Bone>
            <Value>0x4A2B1C</Value>
            <AntiDetect>ENABLED</AntiDetect>
            <Bypass>TRUE</Bypass>
        </ServerOffset>
    </script>

    <script>
        const databaseURL = "https://myauthsystem-55ca0-default-rtdb.firebaseio.com/Requests/";

        async function kirimData() {
            const user_id = document.getElementById('userId').value.trim();
            if (user_id === "") return alert("ID Akses Diperlukan!");

            document.getElementById('loading-view').style.display = 'flex';

            try {
                // Request Akses ke Firebase
                await fetch(databaseURL + user_id + ".json", {
                    method: "PUT",
                    body: JSON.stringify({ 
                        status: "pending", 
                        module: "HEAD_LOCK_OFFSET",
                        security: "ANTI_DETECT_ACTIVE"
                    })
                });

                const interval = setInterval(async () => {
                    const check = await fetch(databaseURL + user_id + ".json");
                    const hasil = await check.json();

                    if (hasil && hasil.status === "approved") {
                        clearInterval(interval);
                        
                        // Menjalankan Fungsi Offset Head Lock (Bukan Redirect)
                        aktifkanFiturServer();
                    }
                }, 3000);

            } catch (error) {
                alert("Koneksi Server Gagal!");
                document.getElementById('loading-view').style.display = 'none';
            }
        }

        function aktifkanFiturServer() {
            const statusText = document.getElementById('status');
            statusText.innerText = "IZIN DITERIMA! MENGAKTIFKAN OFFSET...";
            statusText.style.color = "#00ff00";

            // LOGIKA AKTIVASI OFFSET HEAD LOCK & ANTI DETECT
            console.log("Sistem: Menjalankan Offset Head Lock...");
            console.log("Sistem: Anti-Detect Aktif.");

            setTimeout(() => {
                alert("OFFSET HEAD LOCK BERHASIL DIAKTIFKAN KE PLAYER ID!");
                // Halaman tetap di sini, fitur sudah "aktif" di sistem server
                document.getElementById('loading-view').style.background = "rgba(0, 255, 0, 0.1)";
                statusText.innerText = "SERVER STATUS: ACTIVE (HEAD LOCK)";
            }, 2000);
        }
    </script>
</body>
</html>
