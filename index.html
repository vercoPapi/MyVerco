<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH FF BETA - VERCOPAPI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body {
            background: #05000a;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff;
            overflow: hidden;
        }
        /* Efek Neon Gahar */
        .login-card {
            background: rgba(10, 0, 20, 0.95); padding: 40px; border-radius: 10px;
            border: 1px solid #bc13fe; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 20px #bc13fe; position: relative;
        }
        h2 { color: #bc13fe; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; text-shadow: 0 0 10px #bc13fe; }
        input {
            width: 100%; padding: 12px; background: transparent;
            border: 1px solid #bc13fe; border-radius: 5px; color: #fff;
            text-align: center; font-size: 16px; margin-bottom: 20px; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: #bc13fe;
            border: none; border-radius: 5px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: #fff; color: #bc13fe; box-shadow: 0 0 20px #fff; }

        /* Overlay Loading Menunggu Izin */
        #loading-view {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #05000a; border-radius: 10px; 
            justify-content: center; align-items: center; flex-direction: column; z-index: 99;
        }
        .loader {
            width: 45px; height: 45px; border: 3px solid #333; border-top: 3px solid #bc13fe;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { color: #bc13fe; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <div id="loading-view">
            <div class="loader"></div>
            <p id="status">MENUNGGU IZIN AKSES FF BETA...</p>
        </div>

        <h2>AUTH FF BETA</h2>
        <input type="text" id="userId" placeholder="MASUKKAN ID" autocomplete="off">
        <button onclick="kirimData()">LOGIN SYSTEM</button>
    </div>

    <script>
        const databaseURL = "https://myauthsystem-55ca0-default-rtdb.firebaseio.com/Requests/";

        async function kirimData() {
            const user_id = document.getElementById('userId').value.trim();
            if (user_id === "") return alert("ID Tidak Boleh Kosong!");

            // Munculkan loading
            document.getElementById('loading-view').style.display = 'flex';

            // Kirim ID ke Firebase dengan status PENDING
            await fetch(databaseURL + user_id + ".json", {
                method: "PUT",
                body: JSON.stringify({ status: "pending", type: "FF_BETA" })
            });

            // Cek status terus-menerus
            const interval = setInterval(async () => {
                const check = await fetch(databaseURL + user_id + ".json");
                const hasil = await check.json();

                if (hasil && hasil.status === "approved") {
                    clearInterval(interval);
                    document.getElementById('status').innerText = "AKSES DIIZINKAN! REDIRECTING...";
                    document.getElementById('status').style.color = "#00ff00";
                    
                    // Pindah ke link Auth FF Beta (Ganti URL ini jika perlu yang lebih spesifik)
                    setTimeout(() => {
                        window.location.href = "https://papiverco.my.id"; 
                    }, 1000);
                }
            }, 3000);
        }
    </script>
</body>
</html>
