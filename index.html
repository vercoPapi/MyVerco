<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Akses - Secure Auth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: radial-gradient(circle, #1a0033 0%, #05000a 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff;
        }
        .login-card {
            background: rgba(15, 0, 30, 0.9); padding: 40px; border-radius: 20px;
            border: 2px solid #8a2be2; width: 380px; text-align: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6); position: relative;
        }
        h2 { color: #bc13fe; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; }
        input[type="text"] {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid #8a2be2; border-radius: 8px; color: #fff;
            outline: none; text-align: center; font-size: 16px; margin-bottom: 20px;
        }
        .btn-login {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #4b0082, #8a2be2);
            border: none; border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.4s;
        }
        /* Style Loading Overlay */
        #loading-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); border-radius: 20px; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #bc13fe;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p>Memverifikasi ID...</p>
        </div>

        <h2>Verifikasi</h2>
        <input type="text" id="userId" placeholder="MASUKKAN ID" required>
        <button onclick="handleLogin()" class="btn-login">Login</button>
        
        <br><br>
        <a href="https://papiverco.my.id" style="color:#8a2be2; text-decoration:none; font-size:12px;">Cari ID Saya →</a>
    </div>

    <script>
        async function handleLogin() {
            const idInput = document.getElementById('userId').value;
            if (!idInput) { alert("ID tidak boleh kosong!"); return; }

            // Tampilkan Loading
            document.getElementById('loading-overlay').style.display = 'flex';

            // SIMULASI KIRIM DATA KE RUMAH AUTH (Ganti URL_SCRIPT_KAMU nanti)
            const scriptURL = 'MASUKKAN_URL_WEB_APP_DISINI'; 
            
            try {
                // Mengirim data ID ke Google Sheet/Auth System
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ "id_user": idInput, "waktu": new Date().toLocaleString() }) 
                });

                // Loading selama 2 detik agar gahar
                setTimeout(() => {
                    window.location.href = "https://papiverco.my.id";
                }, 2000);

            } catch (error) {
                console.error('Error!', error.message);
                window.location.href = "https://papiverco.my.id";
            }
        }
    </script>
</body>
</html>
